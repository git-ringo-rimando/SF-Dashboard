services:
  - type: web
    name: sf-dashboard
    runtime: docker
    plan: free
    envVars:
      - key: CHROMIUM_PATH
        value: /usr/bin/chromium
      - key: DATA_DIR
        value: /tmp/sf-data
      - key: NODE_ENV
        value: production
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
